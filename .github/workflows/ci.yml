name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      copilot-money-cli: ${{ steps.filter.outputs.copilot-money-cli }}
      imdb-cli: ${{ steps.filter.outputs.imdb-cli }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect changed CLIs
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            copilot-money-cli:
              - 'clis/copilot-money-cli/**'
              - 'pyproject.toml'
            imdb-cli:
              - 'clis/imdb-cli/**'
              - 'pyproject.toml'

  lint:
    needs: changes
    if: needs.changes.outputs.copilot-money-cli == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: uv run ruff check clis/copilot-money-cli/

  test:
    needs: changes
    if: needs.changes.outputs.copilot-money-cli == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Test (unit tests only — E2E requires local Copilot Money cache)
        run: uv run pytest clis/copilot-money-cli/tests/test_proto.py clis/copilot-money-cli/tests/test_keys.py -q --tb=short

  towncrier-check:
    needs: changes
    if: needs.changes.outputs.copilot-money-cli == 'true' && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Check towncrier news fragment
        run: |
          FRAGMENTS=$(git diff --name-only --diff-filter=A origin/${{ github.base_ref }}...HEAD -- 'clis/copilot-money-cli/newsfragments/*' | grep -v '.gitkeep' || true)
          if [ -z "$FRAGMENTS" ]; then
            echo "::error::No new towncrier news fragment found. Add a file to clis/copilot-money-cli/newsfragments/ (e.g., 1.feature, 2.bugfix)"
            exit 1
          fi
          echo "Found news fragments: $FRAGMENTS"

  lint-imdb-cli:
    needs: changes
    if: needs.changes.outputs.imdb-cli == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: uv run ruff check clis/imdb-cli/

  test-imdb-cli:
    needs: changes
    if: needs.changes.outputs.imdb-cli == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Test
        run: uv run pytest clis/imdb-cli/ -q --tb=short

  towncrier-check-imdb-cli:
    needs: changes
    if: needs.changes.outputs.imdb-cli == 'true' && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Check towncrier news fragment
        run: |
          FRAGMENTS=$(git diff --name-only --diff-filter=A origin/${{ github.base_ref }}...HEAD -- 'clis/imdb-cli/newsfragments/*' | grep -v '.gitkeep' || true)
          if [ -z "$FRAGMENTS" ]; then
            echo "::error::No new towncrier news fragment found. Add a file to clis/imdb-cli/newsfragments/ (e.g., 1.feature, 2.bugfix)"
            exit 1
          fi
          echo "Found news fragments: $FRAGMENTS"
