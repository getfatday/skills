name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  detect-release:
    runs-on: ubuntu-latest
    outputs:
      monarch-cli: ${{ steps.check.outputs.monarch-cli }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        name: Check for news fragments
        run: |
          if find clis/monarch-cli/newsfragments -type f ! -name '.gitkeep' 2>/dev/null | grep -q .; then
            echo "monarch-cli=true" >> "$GITHUB_OUTPUT"
          else
            echo "monarch-cli=false" >> "$GITHUB_OUTPUT"
          fi

  release-monarch-cli:
    needs: detect-release
    if: needs.detect-release.outputs.monarch-cli == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: astral-sh/setup-uv@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run release script
        run: bash scripts/release-cli.sh clis/monarch-cli

      - name: Push release commit and tag
        run: |
          git push origin main
          git push origin --tags

      - name: Create GitHub Release
        run: |
          VERSION=$(cd clis/monarch-cli && uv run bump-my-version show current_version)
          gh release create "monarch-cli-v${VERSION}" \
            --title "monarch-cli v${VERSION}" \
            --notes-file clis/monarch-cli/CHANGELOG.md \
            dist/gfd_monarch_cli-${VERSION}-py3-none-any.whl \
            dist/gfd_monarch_cli-${VERSION}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
